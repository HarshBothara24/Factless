<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <style>
        body {
            width: 350px;
            min-height: 400px;
            margin: 0;
            padding: 0;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
        }

        .header {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 20px;
            text-align: center;
        }

        .header h1 {
            margin: 0;
            font-size: 20px;
            font-weight: 600;
        }

        .header p {
            margin: 5px 0 0 0;
            font-size: 12px;
            opacity: 0.9;
        }

        .content {
            padding: 15px;
        }

        .status {
            display: flex;
            align-items: center;
            gap: 10px;
            padding: 12px;
            background-color: #f3f4f6;
            border-radius: 8px;
            margin-bottom: 15px;
        }

        .status-indicator {
            width: 10px;
            height: 10px;
            border-radius: 50%;
            background-color: #10b981;
        }

        .status-indicator.disconnected {
            background-color: #ef4444;
        }

        .status-text {
            font-size: 13px;
            color: #374151;
        }

        .action-buttons {
            display: flex;
            flex-direction: column;
            gap: 10px;
            margin-bottom: 15px;
        }

        .btn {
            padding: 12px;
            border: none;
            border-radius: 8px;
            font-size: 14px;
            font-weight: 500;
            cursor: pointer;
            transition: all 0.2s;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
        }

        .btn-primary {
            background-color: #667eea;
            color: white;
        }

        .btn-primary:hover {
            background-color: #5568d3;
        }

        .btn-secondary {
            background-color: #f3f4f6;
            color: #374151;
        }

        .btn-secondary:hover {
            background-color: #e5e7eb;
        }

        .history {
            margin-top: 20px;
        }

        .history-title {
            font-size: 14px;
            font-weight: 600;
            color: #111827;
            margin-bottom: 10px;
        }

        .history-item {
            padding: 10px;
            background-color: #f9fafb;
            border-radius: 6px;
            margin-bottom: 8px;
            font-size: 12px;
        }

        .history-item-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 5px;
        }

        .risk-badge {
            padding: 3px 8px;
            border-radius: 4px;
            font-size: 11px;
            font-weight: 600;
        }

        .risk-low {
            background-color: #d1fae5;
            color: #065f46;
        }

        .risk-medium {
            background-color: #fef3c7;
            color: #92400e;
        }

        .risk-high {
            background-color: #fee2e2;
            color: #991b1b;
        }

        .history-text {
            color: #6b7280;
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
        }

        .empty-history {
            text-align: center;
            color: #9ca3af;
            font-size: 13px;
            padding: 20px;
        }

        .footer {
            padding: 15px;
            border-top: 1px solid #e5e7eb;
            text-align: center;
        }

        .footer a {
            color: #667eea;
            text-decoration: none;
            font-size: 12px;
        }

        .footer a:hover {
            text-decoration: underline;
        }
    </style>
</head>
<body>
    <div class="header">
        <h1>🛡️ FACTLESS</h1>
        <p>AI Reliability Checker</p>
    </div>

    <div class="content">
        <div class="status">
            <div class="status-indicator" id="statusIndicator"></div>
            <div class="status-text" id="statusText">Checking connection...</div>
        </div>

        <div class="action-buttons">
            <button class="btn btn-primary" id="analyzeSelection">
                <span>🔍</span>
                <span>Analyze Selected Text</span>
            </button>
            <div style="font-size: 11px; color: #6b7280; text-align: center; margin-top: -5px; margin-bottom: 10px;">
                Select text on the page first, then click
            </div>
            <button class="btn btn-secondary" id="openOptions">
                <span>⚙️</span>
                <span>Settings</span>
            </button>
        </div>

        <div class="history">
            <div class="history-title">Recent Analysis</div>
            <div id="historyList">
                <div class="empty-history">No analysis history yet</div>
            </div>
        </div>
    </div>

    <div class="footer">
        <a href="http://localhost:8000" target="_blank">Open Dashboard</a>
    </div>

    <script src="popup.js"></script>
</body>
</html>
